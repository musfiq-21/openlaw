<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLaw</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <div id="chat-header-title">
                <h1><span class="logo-icon"><img src="logo.svg" alt="OpenLaw Logo"></span>OpenLaw</h1>
            </div>
            <div class="header-buttons">
                <button class="icon-btn" onclick="toggleSettings()" title="সেটিংস">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>
        </div>

        <div id="messages"></div>

        <div id="input-area">
            <form id="input-form">
                <textarea
                    id="message-input"
                    placeholder="Ask questions about laws or constitution..."
                    rows="1"
                    title="Send a message"
                ></textarea>
                <button type="submit" id="send-btn" title="Ask something">
                    ↑
                </button>
            </form>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel">
        <div class="settings-header">
            <h2 id="settings-title">⚙️ সেটিংস</h2>
            <button class="settings-close" onclick="toggleSettings()" title="Close settings">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="settings-content">
            <!-- Language Setting -->
            <div class="setting-group">
                <label class="setting-label" id="lang-label">ভাষা / Language</label>
                <select id="language-select" onchange="changeLanguage(this.value)" title="Select language">
                    <option value="bn">🇧🇩 বাংলা (Bangla)</option>
                    <option value="en">🇺🇸 English</option>
            
                </select>
                <div class="setting-info" id="lang-info">চ্যাট এবং ইউআই এর ভাষা পরিবর্তন করুন</div>
            </div>

            <div class="settings-divider"></div>

            <!-- Dark Mode -->
            <div class="setting-group">
                <label class="setting-label" id="theme-label">ডার্ক মোড / Dark Mode</label>
                <div class="toggle-switch">
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()" title="Toggle dark mode">
                        <span class="slider"></span>
                    </label>
                    <span id="theme-status">অফ</span>
                </div>
                <div class="setting-info" id="theme-info">চোখে আরামদায়ক ডার্ক থিম ব্যবহার করুন</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
