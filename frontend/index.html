<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLaw</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <div id="chat-header-title">
                <h1><span class="logo-icon"><img src="logo.svg" alt="OpenLaw Logo"></span>OpenLaw</h1>
            </div>
            <div class="header-buttons">
                <button class="icon-btn" id="dark-mode-btn" onclick="toggleDarkMode()" title="Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <div id="messages"></div>

        <div id="input-area">
            <form id="input-form">
                <textarea
                    id="message-input"
                    placeholder="Ask questions about laws or constitution..."
                    rows="1"
                    title="Send a message"
                ></textarea>
                <button type="submit" id="send-btn" title="Ask something">
                    ↑
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
